services:
  - type: web
    name: airsave-backend
    env: python
    plan: free # Explicitly setting the free tier for the web service
    buildCommand: ./build.sh
    startCommand: gunicorn airsave_backend.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: airsave-db
          property: connectionString

databases:
  - name: airsave-db
    plan: free # Explicitly setting the free tier for the database